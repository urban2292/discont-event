<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>삼기농협 로컬푸드 할인 이벤트</title>

<style>
    body {
        text-align:center;
        font-family:'Arial';
        margin:0;
        background: linear-gradient(to bottom, #2e7d32, #81c784);
        color:white;
    }

    .container {
        padding:50px;
    }

    h1 {
        font-size:60px;
        margin-bottom:10px;
    }

    h2 {
        font-size:40px;
        margin:20px 0;
        min-height:60px;
    }

    button {
        font-size:30px;
        padding:20px 40px;
        border:none;
        border-radius:15px;
        background-color:#ffeb3b;
        color:black;
        cursor:pointer;
    }

    button:hover {
        background-color:#ffc107;
    }

    .banner {
        width:100%;
        max-height:300px;
        object-fit:cover;
    }
</style>

</head>

<body>

<img class="banner" src="https://images.unsplash.com/photo-1606787366850-de6330128bfc" alt="로컬푸드 이미지">

<div class="container">

<h1>🥩 삼기농협 로컬푸드</h1>
<h1>🎉 할인 추첨 이벤트 🎉</h1>

<h2 id="result">버튼을 눌러주세요!</h2>

<button onclick="draw()">🎯 추첨하기</button>

</div>

<script>
// 1000개 확률 고정
let tickets = [];

// 꽝
for (let i = 0; i < 600; i++) tickets.push("꽝 😢");

// 할인
for (let i = 0; i < 200; i++) tickets.push("5%");
for (let i = 0; i < 120; i++) tickets.push("10%");
for (let i = 0; i < 60; i++) tickets.push("15%");
for (let i = 0; i < 18; i++) tickets.push("20%");
for (let i = 0; i < 2; i++) tickets.push("🎉 30%");

// 섞기
tickets.sort(() => Math.random() - 0.5);

function draw() {
    if (tickets.length === 0) {
        document.getElementById("result").innerText = "이벤트 종료!";
        return;
    }

    let result = tickets.pop();

    if(result.includes("꽝")){
        document.getElementById("result").innerText = "꽝 😢 다음 기회에!";
    } else {
        document.getElementById("result").innerText = result + " 할인 당첨!";
    }
}
</script>

</body>
</html>
